server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # index.html: never cache so Chrome always gets the latest app version
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    try_files $uri =404;
  }

  # hashed assets (JS/CSS): cache for 1 year — filename changes when content changes
  location ~* \.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # everything else
  location / {
    try_files $uri /index.html;
  }
}
